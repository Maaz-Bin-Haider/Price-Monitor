<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Price Monitor{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --border-bright: #2a2a3e;
      --text: #e2e2f0;
      --muted: #6b6b8a;
      --accent: #5b8dee;
      --accent-glow: rgba(91,141,238,0.15);
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.12);
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 400;
      min-height: 100vh;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
    }

    /* NAV */
    nav {
      background: rgba(10,10,15,0.95);
      border-bottom: 1px solid var(--border-bright);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .nav-brand .dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .nav-link {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.4rem 0.9rem;
      border-radius: 4px;
      border: 1px solid transparent;
      transition: all 0.15s;
      letter-spacing: 0.04em;
    }

    .nav-link:hover {
      color: var(--text);
      border-color: var(--border-bright);
      background: var(--surface);
    }

    .nav-link.primary {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .nav-link.primary:hover {
      background: rgba(91,141,238,0.25);
    }

    /* MAIN CONTENT */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
    }

    .card-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
    }

    /* TABLES */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.6rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      padding: 0.25rem 0.6rem;
      border-radius: 3px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-green {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(52,211,153,0.25);
    }

    .badge-amber {
      background: var(--amber-dim);
      color: var(--amber);
      border: 1px solid rgba(251,191,36,0.25);
    }

    .badge-blue {
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid rgba(91,141,238,0.25);
    }

    .badge-red {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(248,113,113,0.25);
    }

    .badge-purple {
      background: rgba(167,139,250,0.1);
      color: #a78bfa;
      border: 1px solid rgba(167,139,250,0.25);
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: #6f9ef0;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border-color: var(--border-bright);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--muted);
      background: var(--surface);
    }

    .btn-danger {
      background: var(--red-dim);
      color: var(--red);
      border-color: rgba(248,113,113,0.3);
    }

    .btn-danger:hover {
      background: rgba(248,113,113,0.2);
    }

    .btn-run {
      background: var(--green-dim);
      color: var(--green);
      border-color: rgba(52,211,153,0.3);
    }

    .btn-run:hover {
      background: rgba(52,211,153,0.2);
      box-shadow: 0 0 16px rgba(52,211,153,0.1);
    }

    /* FORMS */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input[type="text"],
    input[type="number"],
    input[type="email"],
    select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-bright);
      border-radius: 4px;
      padding: 0.65rem 0.9rem;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    select option { background: var(--surface); }

    /* PRICE */
    .price {
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .price-green { color: var(--green); }
    .price-normal { color: var(--text); }
    .price-muted { color: var(--muted); }

    /* SPINNER */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(52,211,153,0.3);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
    }

    .empty-state h2 {
      font-family: var(--mono);
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .empty-state p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }

    /* PAGE HEADER */
    .page-header {
      margin-bottom: 2rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .page-title {
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* TOOLTIP */
    [title] { cursor: help; }

    /* HTMX loading state */
    .htmx-request .spinner { display: inline-block; }
    .htmx-request .btn-label { display: none; }
  </style>
</head>
<body>
<div id="app">
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="dot"></span>
        PRICE MONITOR
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link">Dashboard</a>
        <a href="/add" class="nav-link primary">+ Add Product</a>
      </div>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
