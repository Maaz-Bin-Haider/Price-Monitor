<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Monitor — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0c10;
    --surface:   #111318;
    --border:    #1e2230;
    --accent:    #00e5a0;
    --accent2:   #0080ff;
    --text:      #e8eaf0;
    --muted:     #5a6070;
    --error-bg:  #1f0c0c;
    --error:     #ff4757;
    --mono:      'DM Mono', monospace;
    --display:   'Syne', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing orb */
  body::after {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,229,160,0.07) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 48px 40px 40px;
    position: relative;
    animation: fadeUp 0.5s ease both;
  }

  /* Top accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px 4px 0 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand {
    font-family: var(--display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  h1 {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 32px;
    line-height: 1.1;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.08);
  }

  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 3px;
    font-family: var(--display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:hover  { opacity: 0.88; }
  .btn:active { transform: scale(0.98); }

  .error {
    background: var(--error-bg);
    border: 1px solid rgba(255, 71, 87, 0.3);
    border-radius: 3px;
    padding: 12px 16px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--error);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .error-icon { flex-shrink: 0; margin-top: 1px; }

  .footer-text {
    margin-top: 28px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.06em;
  }

  /* Password visibility toggle */
  .pw-wrap { position: relative; }
  .pw-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--mono);
    padding: 0;
    transition: color 0.2s;
  }
  .pw-toggle:hover { color: var(--text); }
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="brand">Price Monitor</div>
    <h1>Sign In</h1>

    {% if error %}
    <div class="error">
      <span class="error-icon">&#9888;</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST" action="/auth/login" autocomplete="off">
      <div class="field">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="your_username"
          autocomplete="username"
          required
          autofocus
        >
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <button type="button" class="pw-toggle" onclick="togglePw()" id="toggle-btn">show</button>
        </div>
      </div>

      <button type="submit" class="btn">Sign In &rarr;</button>
    </form>

    <p class="footer-text">Access restricted to authorised users only.</p>
  </div>
</div>

<script>
  function togglePw() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('toggle-btn');
    if (inp.type === 'password') {
      inp.type = 'text';
      btn.textContent = 'hide';
    } else {
      inp.type = 'password';
      btn.textContent = 'show';
    }
  }
</script>
</body>
</html>
